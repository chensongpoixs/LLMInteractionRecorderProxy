# Storage Configuration
storage:
  directory: "./data"
  format: "jsonl"
  compress: false
  rotate: "daily"
  max_size: "100mb"

# Proxy Behavior
proxy:
  enable_stream: true
  max_body_size: "10mb"
  rate_limit: 0  # 0 = unlimited
  enable_cors: true
  allowed_origins:
    - "*"
  enable_auth: false
  auth_header: "X-API-Key"
  auth_token: ""

# Monitoring
monitoring:
  enable_health: true
  enable_metrics: true
  metrics_path: "/metrics"

# Logging Configuration
logging:
  level: "debug"           # debug, info, warn, error
  file: "./logs/app.log"
  max_size_mb: 100
  max_backups: 10
  max_age_days: 30
  compress: true
  console: true
  request_log: true
  request_body_log: true
  response_body_log: true
  # 为 true 时：在 INFO 打印 客户端->代理、代理->LLM 的完整 HTTP 及非流式时 LLM 的完整返回体（流式只打响应行+头，体为分块转发）
  upstream_http_log: true
  upstream_log_max_bytes: 262144

# 每日合并前一日请求日志为单文件 JSONL（id/problem/thinking/solution/...）
daily_export:
  enable: true
  output_dir: "./exports"
  file_prefix: "Opus-4.6-Reasoning-3000x-filtered-"
  run_hour: 0
  run_minute: 5
  timezone: "Local"
