# Proxy LLM Configuration

server:
  host: "0.0.0.0"
  port: 8080
  tls_cert: ""  # Optional: path to TLS certificate
  tls_key: ""   # Optional: path to TLS key

# LLM Models Configuration
models:
  - name: "gpt-4"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"  # Can use environment variable
    model: "gpt-4-turbo"
    timeout: 120s
    max_retries: 3

  - name: "claude"
    base_url: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"
    model: "claude-3-opus-20240229"
    timeout: 120s
    max_retries: 3

# Storage Configuration
storage:
  directory: "./data"
  format: "jsonl"
  compress: false
  rotate: "daily"
  max_size: "100mb"

# Proxy Behavior
proxy:
  enable_stream: true
  max_body_size: "10mb"
  rate_limit: 0  # 0 = unlimited
  enable_cors: true
  allowed_origins:
    - "*"
  enable_auth: false
  auth_header: "X-API-Key"
  auth_token: ""

# Monitoring
monitoring:
  enable_health: true
  enable_metrics: true
  metrics_path: "/metrics"
