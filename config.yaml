# Storage Configuration
storage:
  directory: "./data"
  format: "jsonl"
  compress: false
  rotate: "daily"
  max_size: "100mb"

# Proxy Behavior
proxy:
  enable_stream: true
  max_body_size: "10mb"
  rate_limit: 0  # 0 = unlimited
  enable_cors: true
  allowed_origins:
    - "*"
  enable_auth: false
  auth_header: "X-API-Key"
  auth_token: ""

# Monitoring
monitoring:
  enable_health: true
  enable_metrics: true
  metrics_path: "/metrics"

# Logging Configuration
logging:
  level: "debug"           # debug, info, warn, error
  file: "./logs/app.log"
  max_size_mb: 100
  max_backups: 10
  max_age_days: 30
  compress: true
  console: true
  request_log: true
  request_body_log: true
  response_body_log: true
