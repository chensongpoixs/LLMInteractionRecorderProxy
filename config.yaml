# Proxy LLM Configuration

server:
  host: "0.0.0.0"
  port: 20901
  tls_cert: ""  # Optional: path to TLS certificate
  tls_key: ""   # Optional: path to TLS key

# LLM Models Configuration
models:
  - name: "QWen3.6"
    # base_url: "http://js1.blockelite.cn:57700"
    base_url: "http://js2.blockelite.cn:27294"
    api_key: "${OPENAI_API_KEY}"  # Can use environment variable
    model: "Qwen3.6-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled.Q8_0"
    timeout: 120s
    max_retries: 3
