<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy LLM Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" class="app">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo-area">
        <div class="logo-icon">P</div>
        <div>
          <div class="logo-text">Proxy LLM</div>
          <div class="logo-sub">Dashboard &amp; Data Export</div>
        </div>
      </div>
      <div class="top-actions" v-if="activeTab === 'usage'">
        <span :class="'status-dot ' + (streamMode ? 'on' : 'off')"></span>
        <span style="font-size:12px;color:var(--text-secondary)">{{ streamMode ? 'Live' : 'Polling' }}</span>
        <select v-model.number="days" @change="onDaysChange">
          <option :value="7">7 days</option>
          <option :value="14">14 days</option>
          <option :value="30">30 days</option>
          <option :value="90">90 days</option>
        </select>
        <button @click="toggleStreamMode">{{ streamMode ? 'Polling' : 'Live' }}</button>
        <button @click="load" style="display:flex;align-items:center;gap:4px;">
          <span v-if="loading" class="spin"></span>
          Refresh
        </button>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tabs">
      <button :class="['tab-btn', { active: activeTab === 'usage' }]" @click="activeTab = 'usage'">用量统计</button>
      <button :class="['tab-btn', { active: activeTab === 'export' }]" @click="activeTab = 'export'; loadExportDates()">数据导出</button>
      <button :class="['tab-btn', { active: activeTab === 'prompts' }]" @click="activeTab = 'prompts'; loadPromptDates()">提示词浏览</button>
      <button :class="['tab-btn', { active: activeTab === 'agent' }]" @click="activeTab = 'agent'; initAgentModels()">Agent 聊天</button>
    </div>

    <!-- ============ USAGE TAB ============ -->
    <template v-if="activeTab === 'usage'">
      <template v-if="loading && !summary.total_requests">
        <div class="summary-grid">
          <div v-for="n in 4" class="summary-card shimmer" style="height:88px"></div>
        </div>
        <div class="card shimmer" style="height:300px;margin-bottom:16px"></div>
      </template>

      <template v-else>
        <div class="summary-grid">
          <div class="summary-card">
            <div class="label">Total Cost</div>
            <div class="value">${{ fmtCost(summary.estimated_cost_usd) }}</div>
            <div class="sub">{{ fmtInt(summary.total_requests) }} requests</div>
          </div>
          <div class="summary-card">
            <div class="label">Total Tokens</div>
            <div class="value">{{ fmtInt(summary.total_tokens) }}</div>
            <div class="sub">{{ fmtInt(summary.prompt_tokens) }} in &middot; {{ fmtInt(summary.completion_tokens) }} out</div>
            <div class="ratio-bar" v-if="summary.total_tokens > 0">
              <div class="in" :style="{flex: summary.prompt_tokens / summary.total_tokens}"></div>
              <div class="out" :style="{flex: summary.completion_tokens / summary.total_tokens}"></div>
            </div>
            <div class="ratio-labels">
              <span>Input {{ ratio(summary.prompt_tokens, summary.total_tokens) }}%</span>
              <span>Output {{ ratio(summary.completion_tokens, summary.total_tokens) }}%</span>
            </div>
          </div>
          <div class="summary-card">
            <div class="label">Success Rate</div>
            <div class="value">{{ (summary.success_rate * 100).toFixed(1) }}%</div>
            <div class="sub">{{ fmtInt(summary.success_requests) }} / {{ fmtInt(summary.total_requests) }} succeeded</div>
            <div class="ratio-bar" v-if="summary.total_requests > 0">
              <div class="in" :style="{flex: summary.success_rate}"></div>
              <div class="out" :style="{flex: 1 - summary.success_rate}"></div>
            </div>
          </div>
          <div class="summary-card">
            <div class="label">Avg Latency</div>
            <div class="value">{{ fmtLatency(summary.avg_latency_ms) }}</div>
            <div class="sub">Updated {{ timeAgo(summary.generated_at) }}</div>
          </div>
        </div>

        <div class="two-col">
          <div class="card">
            <div class="card-title">
              <span>Daily Token Usage</span>
              <span class="badge">{{ chartData.length }} days</span>
            </div>
            <div class="chart-wrap">
              <div class="chart-y-label">
                <span>{{ fmtInt(chartMax) }}</span>
                <span>{{ fmtInt(Math.round(chartMax/2)) }}</span>
                <span>0</span>
              </div>
              <div class="chart-area">
                <div class="col-wrap" v-for="point in chartData" :key="point.date">
                  <div class="col-tooltip">
                    <div style="font-weight:600;margin-bottom:4px;">{{ point.dateLabel }}</div>
                    <div style="display:flex;gap:12px;">
                      <span>Input {{ fmtInt(point.prompt_tokens) }}</span>
                      <span>Output {{ fmtInt(point.completion_tokens) }}</span>
                    </div>
                  </div>
                  <div class="col-stack" :style="{height: point.height + '%'}">
                    <div class="o" :style="{flex: point.completion_ratio}"></div>
                    <div class="i" :style="{flex: point.prompt_ratio}"></div>
                  </div>
                  <div class="col-label">{{ point.shortDate }}</div>
                </div>
                <div v-if="chartData.length === 0" class="empty-state">No data for this period</div>
              </div>
            </div>
            <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text-secondary);">
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--input-color);vertical-align:middle;margin-right:4px;"></span> Input</span>
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--output-color);vertical-align:middle;margin-right:4px;"></span> Output</span>
            </div>
          </div>

          <div class="card">
            <div class="card-title">
              <span>Models</span>
              <span class="badge">{{ summary.by_model.length }}</span>
            </div>
            <div class="model-list">
              <template v-if="summary.by_model.length === 0">
                <div class="empty-state">No model data</div>
              </template>
              <div class="model-row" v-for="m in summary.by_model" :key="m.model">
                <div class="top">
                  <span class="name">{{ shortModel(m.model) }}</span>
                  <span class="tokens">{{ fmtInt(m.total_tokens) }} tokens</span>
                </div>
                <div class="model-bar-wrap">
                  <div class="i" :style="{flex: m.prompt_tokens / Math.max(m.total_tokens, 1)}"></div>
                  <div class="o" :style="{flex: m.completion_tokens / Math.max(m.total_tokens, 1)}"></div>
                </div>
                <div class="cost-row">
                  <span>{{ fmtInt(m.requests) }} req &middot; {{ fmtInt(m.prompt_tokens) }} in / {{ fmtInt(m.completion_tokens) }} out</span>
                  <span>${{ fmtCost(m.estimated_cost_usd) }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <span>Recent Requests</span>
            <span class="badge">Top {{ Math.min(summary.recent.length, 20) }}</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Time</th><th>Model</th><th>Endpoint</th><th>Status</th>
                  <th style="text-align:right">Input</th><th style="text-align:right">Output</th>
                  <th style="text-align:right">Total</th><th style="text-align:right">Latency</th><th style="text-align:right">Cost</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="r in summary.recent" :key="r.timestamp + r.model + r.endpoint">
                  <td style="color:var(--text-secondary);font-size:12px;">{{ fmtTime(r.timestamp) }}</td>
                  <td><span class="model-tag">{{ shortModel(r.model) }}</span></td>
                  <td>{{ shortEndpoint(r.endpoint) }}</td>
                  <td>
                    <span class="status-code">
                      <span :class="r.status_code < 400 ? 'dot-ok' : 'dot-err'"></span>{{ r.status_code }}
                    </span>
                  </td>
                  <td style="text-align:right">{{ fmtInt(r.prompt_tokens) }}</td>
                  <td style="text-align:right">{{ fmtInt(r.completion_tokens) }}</td>
                  <td style="text-align:right;font-weight:500;">{{ fmtInt(r.total_tokens) }}</td>
                  <td style="text-align:right;color:var(--text-secondary)">{{ fmtLatency(r.duration_ms) }}</td>
                  <td style="text-align:right;color:var(--text-secondary)">${{ r.estimated_cost_usd.toFixed(4) }}</td>
                </tr>
                <tr v-if="summary.recent.length === 0">
                  <td colspan="9" class="empty-state">No recent requests</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </template>

    <!-- ============ EXPORT TAB ============ -->
    <template v-if="activeTab === 'export'">
      <div class="export-actions">
        <span style="font-size:13px;color:var(--text-secondary);">格式:</span>
        <select v-model="exportFormat" style="background:var(--card);color:var(--text);border:1px solid var(--line);padding:4px 8px;border-radius:4px;font-size:12px;">
          <option value="reasoning">推理格式 (problem/thinking/solution)</option>
          <option value="messages">OpenAI 微调格式 (messages)</option>
          <option value="dataset">工业标准 (prompts/responses/revisions/feedback)</option>
        </select>
        <span style="font-size:13px;color:var(--text-secondary);margin-left:12px;">选择日期后点击"导出"</span>
        <button class="btn-sm" @click="uploadToModelScope" :disabled="uploadingToMS" style="margin-left:auto; background: var(--accent-bg); color: var(--accent); border-color: var(--accent);">
          <span v-if="uploadingToMS" class="spin" style="width:12px;height:12px;"></span>
          {{ uploadingToMS ? '推送中...' : '推送 ModelScope' }}
        </button>
        <button class="btn-sm" @click="uploadToHuggingFace" :disabled="uploadingToHF" style="background: var(--orange-bg); color: var(--orange); border-color: var(--orange);">
          <span v-if="uploadingToHF" class="spin" style="width:12px;height:12px;"></span>
          {{ uploadingToHF ? '推送中...' : '推送 HuggingFace' }}
        </button>
        <button class="btn-sm" @click="loadExportDates">
          <span v-if="exportLoading" class="spin" style="width:12px;height:12px;"></span>
          刷新列表
        </button>
      </div>

      <div class="card">
        <div class="card-title">
          <span>按天导出</span>
          <span class="badge">{{ exportDates.length }} 天</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:120px">日期</th>
                <th style="width:100px">日志文件数</th>
                <th style="width:100px">状态</th>
                <th style="width:280px">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr v-if="exportDates.length === 0 && !exportLoading">
                <td colspan="4" class="empty-state">暂无数据 — 请先通过代理发送请求产生日志</td>
              </tr>
              <tr v-for="d in exportDates" :key="d.date">
                <td style="font-weight:500;">{{ fmtExportDate(d.date) }}</td>
                <td>{{ d.file_count }} 个文件</td>
                <td>
                  <span v-if="d.exported" class="tag exported">已导出</span>
                  <span v-else-if="d.file_count > 0" class="tag pending">待导出</span>
                  <span v-else class="tag empty">无数据</span>
                </td>
                <td>
                  <div style="display:flex;gap:6px;align-items:center;">
                    <button class="btn-sm"
                      :disabled="d.file_count === 0 || d.exporting"
                      @click="triggerExport(d)">
                      <span v-if="d.exporting" class="spin" style="width:12px;height:12px;"></span>
                      {{ d.exporting ? '导出中...' : '导出' }}
                    </button>
                    <button v-if="d.exported && d.export_file" class="btn-sm download"
                      @click="downloadExport(d.export_file)">
                      下载
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- ============ PROMPTS TAB (DeepSeek Style) ============ -->
    <template v-if="activeTab === 'prompts'">
      <div class="conv-layout">
        <!-- Left: Conversation list sidebar -->
        <div class="conv-sidebar">
          <div class="conv-sidebar-header">
            <span class="title">对话列表</span>
            <button class="btn-sm" @click="loadConversations" :disabled="convLoading" style="margin-left:auto;">刷新</button>
          </div>
          <div class="conv-list">
            <template v-if="convLoading && convGroups.length === 0">
              <div class="shimmer" style="height:200px;"></div>
            </template>
            <template v-else-if="convGroups.length === 0">
              <div class="empty-state" style="padding:30px 20px;font-size:12px;">暂无对话数据</div>
            </template>
            <template v-else>
              <template v-for="group in convGroups" :key="group.label + group.date">
                <div class="conv-group-header">{{ group.label }}</div>
                <div v-for="conv in group.conversations" :key="conv.id"
                  :class="['conv-item', { active: selectedConvId === conv.id }]"
                  @click="selectConversation(conv.id)">
                  <div class="conv-item-title">{{ conv.title || '(无标题)' }}</div>
                  <div class="conv-item-meta">
                    <span>{{ fmtDateShort(conv.timestamp) }}</span>
                    <span class="conv-item-model">{{ shortModel(conv.model) }}</span>
                    <span class="conv-item-badge">{{ conv.turn_count }} 轮</span>
                  </div>
                </div>
              </template>
            </template>
          </div>
        </div>

        <!-- Right: Chat-style message display -->
        <div class="conv-chat">
          <template v-if="!selectedConvId">
            <div class="conv-empty">
              <div>
                <div class="conv-empty-icon">💬</div>
                <div>选择左侧对话查看详情</div>
              </div>
            </div>
          </template>
          <template v-else>
            <div class="conv-chat-header">
              <div class="conv-item-title" style="font-size:15px;font-weight:600;margin-bottom:2px;">{{ selectedConv?.title || '(无标题)' }}</div>
              <div class="conv-subtitle">{{ shortModel(selectedConv?.model) }} · {{ selectedConv?.turn_count || 0 }} 轮 · {{ fmtDateShort(selectedConv?.timestamp) }}</div>
            </div>

            <div v-if="convDetailLoading" class="conv-loading">
              <span class="spin" style="width:18px;height:18px;margin-right:10px;"></span> 加载中...
            </div>

            <div v-else-if="selectedConv?.turns" class="conv-messages" ref="convMessages">
              <template v-for="(turn, idx) in selectedConv.turns" :key="turn.turn_index">
                <!-- User message -->
                <div class="msg-row user">
                  <div class="msg-meta">
                    <span>{{ fmtTime(turn.timestamp) }}</span>
                    <span class="conv-item-model" style="font-size:10px;">{{ shortModel(turn.model) }}</span>
                    <span style="color:var(--text-muted);">{{ fmtInt(turn.total_tokens) }} tokens</span>
                  </div>
                  <div class="msg-bubble user">{{ turn.user_message }}</div>
                </div>

                <!-- Thinking (collapsible) -->
                <div v-if="turn.thinking" class="msg-row assistant">
                  <div class="think-block">
                    <div class="think-block-header" @click="toggleThinking(turn.turn_index)">
                      <span class="think-icon">🧠</span>
                      <span>思考过程</span>
                      <span class="think-arrow">{{ collapsedThinking[turn.turn_index] ? '▸' : '▾' }}</span>
                    </div>
                    <div v-if="!collapsedThinking[turn.turn_index]" class="think-block-body">{{ turn.thinking }}</div>
                  </div>
                </div>

                <!-- Assistant response -->
                <div v-if="turn.response" class="msg-row assistant">
                  <div class="msg-bubble-wrap">
                    <button class="msg-copy-btn" @click="copyText(turn.response)">复制</button>
                    <div class="msg-bubble assistant">{{ turn.response }}</div>
                  </div>
                </div>

                <!-- Divider between turns -->
                <div v-if="idx < selectedConv.turns.length - 1"
                  style="border-top:1px solid var(--line);margin:4px 0;opacity:0.3;"></div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Agent chat tab -->
    <template v-if="activeTab === 'agent'">
      <div class="agent-layout">
        <div class="agent-topbar">
          <select v-model="agentModel">
            <option v-for="m in agentModels" :value="m">{{ m }}</option>
          </select>
          <label class="tool-toggle"><input type="checkbox" v-model="agentTools.bash"> bash</label>
          <label class="tool-toggle"><input type="checkbox" v-model="agentTools.read_file"> read_file</label>
          <label class="tool-toggle"><input type="checkbox" v-model="agentTools.write_file"> write_file</label>
          <label class="tool-toggle"><input type="checkbox" v-model="agentTools.grep"> grep</label>
          <label class="tool-toggle"><input type="checkbox" v-model="agentTools.glob"> glob</label>
          <button @click="clearAgentChat" class="btn-sm" style="margin-left:auto;">清空</button>
        </div>

        <div class="agent-chat" ref="agentChat">
          <template v-if="agentMessages.length === 0 && !agentLoading">
            <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;">
              <div style="text-align:center;">
                <div style="font-size:40px;margin-bottom:12px;">🤖</div>
                <div>输入任务描述，Agent 会自动使用工具执行</div>
              </div>
            </div>
          </template>

          <div v-for="(msg, idx) in agentMessages" :key="idx" :class="['agent-msg', msg.role]">
            <div v-if="msg.role === 'user'" class="agent-bubble user">{{ msg.content }}</div>

            <div v-if="msg.role === 'thinking'" class="agent-thinking-box">
              <div class="think-header" @click="msg.collapsed = !msg.collapsed">
                <span>🧠 思考 #{{ msg.iteration }}</span>
                <span style="font-size:10px;margin-left:4px;">{{ msg.collapsed ? '▸' : '▾' }}</span>
              </div>
              <div v-if="!msg.collapsed" class="think-body">{{ msg.content }}</div>
            </div>

            <div v-if="msg.role === 'action'" class="agent-action-card">
              <div>🔧 <strong>{{ msg.tool }}</strong> {{ msg.args }}</div>
              <div style="color:var(--text-muted);font-size:11px;margin-top:2px;">{{ msg.descriptor }}</div>
            </div>

            <div v-if="msg.role === 'observation'" class="agent-obs-box">
              <div class="obs-header" @click="msg.collapsed = !msg.collapsed">
                <span>📋 观测结果 #{{ msg.iteration }}</span>
                <span style="font-size:10px;margin-left:4px;">{{ msg.collapsed ? '▸' : '▾' }}</span>
              </div>
              <pre v-if="!msg.collapsed" class="obs-body">{{ msg.content }}</pre>
            </div>

            <div v-if="msg.role === 'response'" class="agent-bubble assistant">{{ msg.content }}</div>
            <div v-if="msg.role === 'error'" class="agent-bubble error">❌ {{ msg.content }}</div>
          </div>

          <div v-if="agentLoading" class="agent-loading">
            <span class="spin" style="width:12px;height:12px;"></span>
            <span>Agent 思考中</span><span class="dots"></span>
          </div>
        </div>

        <div class="agent-input-area">
          <textarea v-model="agentInput" @keydown.ctrl.enter="sendAgentMessage"
            placeholder="输入任务，Agent 自动使用工具执行（Ctrl+Enter 发送）..." rows="2"></textarea>
          <button @click="sendAgentMessage" :disabled="agentLoading || !agentInput.trim()" class="btn-primary">发送</button>
        </div>
      </div>
    </template>

    <!-- Toast -->
    <div v-if="toast.show" :class="['toast', toast.type]">{{ toast.message }}</div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
