<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy LLM Dashboard</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --card: #161920;
      --card-hover: #1c202b;
      --line: #262a35;
      --line-hover: #3a3f50;
      --text: #e8edf5;
      --text-secondary: #8b95b0;
      --text-muted: #5c647a;
      --accent: #6c8cff;
      --accent-bg: rgba(108,140,255,0.12);
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.12);
      --orange: #f59e0b;
      --orange-bg: rgba(245,158,11,0.1);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --blue: #60a5fa;
      --input-color: #6c8cff;
      --output-color: #a78bfa;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }
    .tab-btn {
      padding: 10px 24px; font-size: 14px; font-weight: 500;
      background: none; border: none; color: var(--text-secondary);
      cursor: pointer; font-family: var(--font);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Header */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; flex-wrap: wrap; gap: 12px;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--output-color));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
    }
    .logo-text { font-size: 18px; font-weight: 600; }
    .logo-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
    .top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .top-actions select, .top-actions button {
      background: var(--card); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; padding: 6px 12px; font-size: 13px;
      cursor: pointer; font-family: var(--font);
    }
    .top-actions select { padding: 6px 28px 6px 12px; appearance: auto; }
    .top-actions button:hover { background: var(--card-hover); border-color: var(--line-hover); }
    .status-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.off { background: var(--text-muted); }

    /* Summary Grid */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 16px;
    }
    .summary-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 16px 18px;
      transition: border-color .15s, background .15s;
    }
    .summary-card:hover { border-color: var(--line-hover); background: var(--card-hover); }
    .summary-card .label {
      font-size: 12px; color: var(--text-secondary); font-weight: 500;
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .summary-card .value {
      font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
    }
    .summary-card .sub {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
    }
    .ratio-bar {
      display: flex; height: 3px; border-radius: 2px; overflow: hidden;
      margin-top: 10px; gap: 2px;
    }
    .ratio-bar .in { background: var(--input-color); }
    .ratio-bar .out { background: var(--output-color); }
    .ratio-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }

    /* Two column layout */
    .two-col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 12px; margin-bottom: 16px; }

    /* Card container */
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 18px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-title .badge {
      font-size: 11px; font-weight: 400; color: var(--text-secondary);
      background: var(--accent-bg); padding: 2px 8px; border-radius: 999px;
    }

    /* Chart */
    .chart-wrap { position: relative; }
    .chart-y-label {
      position: absolute; left: 0; top: 0; bottom: 28px;
      display: flex; flex-direction: column; justify-content: space-between;
      font-size: 10px; color: var(--text-muted); width: 40px; text-align: right;
      padding-right: 8px;
    }
    .chart-area {
      margin-left: 48px; height: 200px;
      display: flex; align-items: flex-end; gap: 3px;
    }
    .col-wrap { flex: 1; min-width: 6px; display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
    .col-stack { width: 100%; border-radius: 3px 3px 0 0; display: flex; flex-direction: column; min-height: 2px; transition: opacity .15s; }
    .col-stack:hover { opacity: 0.8; }
    .col-stack .i { background: var(--input-color); }
    .col-stack .o { background: var(--output-color); }
    .col-label { font-size: 9px; color: var(--text-muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40px; }
    .col-tooltip {
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #1c202b; border: 1px solid var(--line-hover); border-radius: 8px;
      padding: 8px 12px; font-size: 12px; white-space: nowrap; z-index: 10;
      pointer-events: none; opacity: 0; transition: opacity .15s; margin-bottom: 6px;
    }
    .col-wrap:hover .col-tooltip { opacity: 1; }

    /* Model table */
    .model-list { display: flex; flex-direction: column; gap: 10px; }
    .model-row { }
    .model-row .top {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
    }
    .model-row .top .name { font-size: 13px; font-weight: 500; }
    .model-row .top .tokens { font-size: 12px; color: var(--text-secondary); }
    .model-bar-wrap {
      height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden;
      display: flex; gap: 1px;
    }
    .model-bar-wrap .i { background: var(--input-color); height: 100%; }
    .model-bar-wrap .o { background: var(--output-color); height: 100%; }
    .model-row .cost-row {
      display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 3px;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 6px; color: var(--text-secondary); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--line); }
    td { padding: 8px 6px; border-bottom: 1px solid rgba(38,42,53,0.5); white-space: nowrap; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .status-code { display: inline-flex; align-items: center; gap: 4px; }
    .dot-ok { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .dot-err { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
    .model-tag {
      display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 999px;
      background: var(--accent-bg); color: var(--accent);
    }

    /* Export tab */
    .export-actions { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: var(--font); transition: opacity .15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sm {
      background: var(--card); color: var(--accent); border: 1px solid var(--line);
      border-radius: 6px; padding: 4px 14px; font-size: 12px;
      cursor: pointer; font-family: var(--font); transition: all .15s;
    }
    .btn-sm:hover { background: var(--accent-bg); border-color: var(--accent); }
    .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sm.download { color: var(--green); }
    .btn-sm.download:hover { background: var(--green-bg); border-color: var(--green); }
    .tag {
      display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 999px;
      font-weight: 500;
    }
    .tag.exported { background: var(--green-bg); color: var(--green); }
    .tag.pending { background: var(--orange-bg); color: var(--orange); }
    .tag.empty { background: rgba(255,255,255,0.05); color: var(--text-muted); }
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--text-muted); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed; top: 20px; right: 20px; z-index: 999;
      padding: 12px 20px; border-radius: 10px; font-size: 13px;
      max-width: 400px; animation: fadeIn .2s;
    }
    .toast.success { background: #065f46; color: var(--green); border: 1px solid var(--green); }
    .toast.error { background: #7f1d1d; color: var(--red); border: 1px solid var(--red); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    /* Responsive */
    @media (max-width: 880px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .summary-grid { grid-template-columns: 1fr; }
      .app { padding: 16px 12px; }
    }

    /* Loading shimmer */
    .shimmer { position: relative; overflow: hidden; }
    .shimmer::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

    /* Prompt list */
    .prompt-preview {
      max-width: 480px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text-secondary); font-size: 13px; line-height: 1.4;
    }
    .prompt-full {
      max-width: 600px;
      white-space: pre-wrap; word-break: break-word;
      font-size: 13px; line-height: 1.6; color: var(--text);
      padding: 8px 0;
    }
    .pagination {
      display: flex; justify-content: center; align-items: center; gap: 12px;
      margin-top: 16px; padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .page-info {
      font-size: 13px; color: var(--text-secondary);
      min-width: 60px; text-align: center;
    }
    tr.prompt-row { cursor: pointer; }
    tr.prompt-row:hover { background: rgba(108,140,255,0.04); }

    /* Prompts tab layout */
    .prompts-layout { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: start; }
    .prompts-sidebar { position: sticky; top: 0; }
    .prompts-main { min-width: 0; }

    /* Date tree */
    .date-month { margin-bottom: 2px; }
    .date-month-header {
      display: flex; align-items: center; gap: 6px; padding: 8px 10px;
      cursor: pointer; border-radius: 4px; font-size: 13px; font-weight: 500;
      color: var(--text); user-select: none;
    }
    .date-month-header:hover { background: var(--line); }
    .date-month-arrow { font-size: 10px; width: 12px; color: var(--text-muted); }
    .date-day-list { padding-left: 18px; }
    .date-day-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; border-radius: 4px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary);
    }
    .date-day-item:hover { background: var(--line); color: var(--text); }
    .date-day-item.active { background: rgba(108,140,255,0.15); color: var(--accent); font-weight: 500; }

    /* QA Cards */
    .qa-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 8px; margin-bottom: 12px; overflow: hidden;
    }
    .qa-question { padding: 12px 16px; cursor: pointer; }
    .qa-question:hover { background: rgba(108,140,255,0.02); }
    .qa-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .qa-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .qa-time { font-size: 12px; color: var(--text-muted); }
    .qa-prompt { display: flex; gap: 8px; align-items: flex-start; }
    .qa-label {
      flex-shrink: 0; width: 22px; height: 22px; border-radius: 4px;
      background: var(--accent); color: #fff; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* Answer section */
    .qa-answer { border-top: 1px solid var(--line); }
    .qa-thinking { background: rgba(167,139,250,0.06); padding: 12px 16px; }
    .qa-thinking-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
      font-size: 12px; font-weight: 600; color: var(--output-color); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .qa-thinking-icon, .qa-solution-icon { font-size: 14px; }
    .qa-thinking-body {
      font-size: 13px; line-height: 1.7; color: var(--text-secondary);
      white-space: pre-wrap; word-break: break-word;
      max-height: 400px; overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    }
    .qa-solution { padding: 12px 16px; background: rgba(108,140,255,0.03); }
    .qa-solution-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
      font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .qa-solution-body {
      font-size: 13px; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      max-height: 500px; overflow-y: auto;
    }

    @media (max-width: 768px) {
      .prompts-layout { grid-template-columns: 1fr; }
      .prompts-sidebar { position: static; }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo-area">
        <div class="logo-icon">P</div>
        <div>
          <div class="logo-text">Proxy LLM</div>
          <div class="logo-sub">Dashboard &amp; Data Export</div>
        </div>
      </div>
      <div class="top-actions" v-if="activeTab === 'usage'">
        <span :class="'status-dot ' + (streamMode ? 'on' : 'off')"></span>
        <span style="font-size:12px;color:var(--text-secondary)">{{ streamMode ? 'Live' : 'Polling' }}</span>
        <select v-model.number="days" @change="onDaysChange">
          <option :value="7">7 days</option>
          <option :value="14">14 days</option>
          <option :value="30">30 days</option>
          <option :value="90">90 days</option>
        </select>
        <button @click="toggleStreamMode">{{ streamMode ? 'Polling' : 'Live' }}</button>
        <button @click="load" style="display:flex;align-items:center;gap:4px;">
          <span v-if="loading" class="spin"></span>
          Refresh
        </button>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tabs">
      <button :class="['tab-btn', { active: activeTab === 'usage' }]" @click="activeTab = 'usage'">用量统计</button>
      <button :class="['tab-btn', { active: activeTab === 'export' }]" @click="activeTab = 'export'; loadExportDates()">数据导出</button>
      <button :class="['tab-btn', { active: activeTab === 'prompts' }]" @click="activeTab = 'prompts'; loadPromptDates()">提示词浏览</button>
    </div>

    <!-- ============ USAGE TAB ============ -->
    <template v-if="activeTab === 'usage'">
      <!-- Loading skeleton -->
      <template v-if="loading && !summary.total_requests">
        <div class="summary-grid">
          <div v-for="n in 4" class="summary-card shimmer" style="height:88px"></div>
        </div>
        <div class="card shimmer" style="height:300px;margin-bottom:16px"></div>
      </template>

      <template v-else>
        <!-- Summary Cards -->
        <div class="summary-grid">
          <div class="summary-card">
            <div class="label">Total Cost</div>
            <div class="value">${{ fmtCost(summary.estimated_cost_usd) }}</div>
            <div class="sub">{{ fmtInt(summary.total_requests) }} requests</div>
          </div>
          <div class="summary-card">
            <div class="label">Total Tokens</div>
            <div class="value">{{ fmtInt(summary.total_tokens) }}</div>
            <div class="sub">{{ fmtInt(summary.prompt_tokens) }} in &middot; {{ fmtInt(summary.completion_tokens) }} out</div>
            <div class="ratio-bar" v-if="summary.total_tokens > 0">
              <div class="in" :style="{flex: summary.prompt_tokens / summary.total_tokens}"></div>
              <div class="out" :style="{flex: summary.completion_tokens / summary.total_tokens}"></div>
            </div>
            <div class="ratio-labels">
              <span>Input {{ ratio(summary.prompt_tokens, summary.total_tokens) }}%</span>
              <span>Output {{ ratio(summary.completion_tokens, summary.total_tokens) }}%</span>
            </div>
          </div>
          <div class="summary-card">
            <div class="label">Success Rate</div>
            <div class="value">{{ (summary.success_rate * 100).toFixed(1) }}%</div>
            <div class="sub">{{ fmtInt(summary.success_requests) }} / {{ fmtInt(summary.total_requests) }} succeeded</div>
            <div class="ratio-bar" v-if="summary.total_requests > 0">
              <div class="in" :style="{flex: summary.success_rate}"></div>
              <div class="out" :style="{flex: 1 - summary.success_rate}"></div>
            </div>
          </div>
          <div class="summary-card">
            <div class="label">Avg Latency</div>
            <div class="value">{{ fmtLatency(summary.avg_latency_ms) }}</div>
            <div class="sub">Updated {{ timeAgo(summary.generated_at) }}</div>
          </div>
        </div>

        <!-- Two Column: Chart + Models -->
        <div class="two-col">
          <div class="card">
            <div class="card-title">
              <span>Daily Token Usage</span>
              <span class="badge">{{ chartData.length }} days</span>
            </div>
            <div class="chart-wrap">
              <div class="chart-y-label">
                <span>{{ fmtInt(chartMax) }}</span>
                <span>{{ fmtInt(Math.round(chartMax/2)) }}</span>
                <span>0</span>
              </div>
              <div class="chart-area">
                <div class="col-wrap" v-for="point in chartData" :key="point.date">
                  <div class="col-tooltip">
                    <div style="font-weight:600;margin-bottom:4px;">{{ point.dateLabel }}</div>
                    <div style="display:flex;gap:12px;">
                      <span>Input {{ fmtInt(point.prompt_tokens) }}</span>
                      <span>Output {{ fmtInt(point.completion_tokens) }}</span>
                    </div>
                  </div>
                  <div class="col-stack" :style="{height: point.height + '%'}">
                    <div class="o" :style="{flex: point.completion_ratio}"></div>
                    <div class="i" :style="{flex: point.prompt_ratio}"></div>
                  </div>
                  <div class="col-label">{{ point.shortDate }}</div>
                </div>
                <div v-if="chartData.length === 0" class="empty-state">No data for this period</div>
              </div>
            </div>
            <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text-secondary);">
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--input-color);vertical-align:middle;margin-right:4px;"></span> Input</span>
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--output-color);vertical-align:middle;margin-right:4px;"></span> Output</span>
            </div>
          </div>

          <div class="card">
            <div class="card-title">
              <span>Models</span>
              <span class="badge">{{ summary.by_model.length }}</span>
            </div>
            <div class="model-list">
              <template v-if="summary.by_model.length === 0">
                <div class="empty-state">No model data</div>
              </template>
              <div class="model-row" v-for="m in summary.by_model" :key="m.model">
                <div class="top">
                  <span class="name">{{ shortModel(m.model) }}</span>
                  <span class="tokens">{{ fmtInt(m.total_tokens) }} tokens</span>
                </div>
                <div class="model-bar-wrap">
                  <div class="i" :style="{flex: m.prompt_tokens / Math.max(m.total_tokens, 1)}"></div>
                  <div class="o" :style="{flex: m.completion_tokens / Math.max(m.total_tokens, 1)}"></div>
                </div>
                <div class="cost-row">
                  <span>{{ fmtInt(m.requests) }} req &middot; {{ fmtInt(m.prompt_tokens) }} in / {{ fmtInt(m.completion_tokens) }} out</span>
                  <span>${{ fmtCost(m.estimated_cost_usd) }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Requests -->
        <div class="card">
          <div class="card-title">
            <span>Recent Requests</span>
            <span class="badge">Top {{ Math.min(summary.recent.length, 20) }}</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Time</th><th>Model</th><th>Endpoint</th><th>Status</th>
                  <th style="text-align:right">Input</th><th style="text-align:right">Output</th>
                  <th style="text-align:right">Total</th><th style="text-align:right">Latency</th><th style="text-align:right">Cost</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="r in summary.recent" :key="r.timestamp + r.model + r.endpoint">
                  <td style="color:var(--text-secondary);font-size:12px;">{{ fmtTime(r.timestamp) }}</td>
                  <td><span class="model-tag">{{ shortModel(r.model) }}</span></td>
                  <td>{{ shortEndpoint(r.endpoint) }}</td>
                  <td>
                    <span class="status-code">
                      <span :class="r.status_code < 400 ? 'dot-ok' : 'dot-err'"></span>{{ r.status_code }}
                    </span>
                  </td>
                  <td style="text-align:right">{{ fmtInt(r.prompt_tokens) }}</td>
                  <td style="text-align:right">{{ fmtInt(r.completion_tokens) }}</td>
                  <td style="text-align:right;font-weight:500;">{{ fmtInt(r.total_tokens) }}</td>
                  <td style="text-align:right;color:var(--text-secondary)">{{ fmtLatency(r.duration_ms) }}</td>
                  <td style="text-align:right;color:var(--text-secondary)">${{ r.estimated_cost_usd.toFixed(4) }}</td>
                </tr>
                <tr v-if="summary.recent.length === 0">
                  <td colspan="9" class="empty-state">No recent requests</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </template>

    <!-- ============ EXPORT TAB ============ -->
    <template v-if="activeTab === 'export'">
      <div class="export-actions">
        <span style="font-size:13px;color:var(--text-secondary);">格式:</span>
        <select v-model="exportFormat" style="background:var(--card);color:var(--text);border:1px solid var(--line);padding:4px 8px;border-radius:4px;font-size:12px;">
          <option value="reasoning">推理格式 (problem/thinking/solution)</option>
          <option value="messages">OpenAI 微调格式 (messages)</option>
          <option value="dataset">工业标准 (prompts/responses/revisions/feedback)</option>
        </select>
        <span style="font-size:13px;color:var(--text-secondary);margin-left:12px;">选择日期后点击"导出"</span>
        <button class="btn-sm" @click="uploadToModelScope" :disabled="uploadingToMS" style="margin-left:auto; background: var(--accent-bg); color: var(--accent); border-color: var(--accent);">
          <span v-if="uploadingToMS" class="spin" style="width:12px;height:12px;"></span>
          {{ uploadingToMS ? '推送中...' : '推送 ModelScope' }}
        </button>
        <button class="btn-sm" @click="uploadToHuggingFace" :disabled="uploadingToHF" style="background: var(--orange-bg); color: var(--orange); border-color: var(--orange);">
          <span v-if="uploadingToHF" class="spin" style="width:12px;height:12px;"></span>
          {{ uploadingToHF ? '推送中...' : '推送 HuggingFace' }}
        </button>
        <button class="btn-sm" @click="loadExportDates">
          <span v-if="exportLoading" class="spin" style="width:12px;height:12px;"></span>
          刷新列表
        </button>
      </div>

      <div class="card">
        <div class="card-title">
          <span>按天导出</span>
          <span class="badge">{{ exportDates.length }} 天</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:120px">日期</th>
                <th style="width:100px">日志文件数</th>
                <th style="width:100px">状态</th>
                <th style="width:280px">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr v-if="exportDates.length === 0 && !exportLoading">
                <td colspan="4" class="empty-state">暂无数据 — 请先通过代理发送请求产生日志</td>
              </tr>
              <tr v-for="d in exportDates" :key="d.date">
                <td style="font-weight:500;">{{ fmtExportDate(d.date) }}</td>
                <td>{{ d.file_count }} 个文件</td>
                <td>
                  <span v-if="d.exported" class="tag exported">已导出</span>
                  <span v-else-if="d.file_count > 0" class="tag pending">待导出</span>
                  <span v-else class="tag empty">无数据</span>
                </td>
                <td>
                  <div style="display:flex;gap:6px;align-items:center;">
                    <button class="btn-sm"
                      :disabled="d.file_count === 0 || d.exporting"
                      @click="triggerExport(d)">
                      <span v-if="d.exporting" class="spin" style="width:12px;height:12px;"></span>
                      {{ d.exporting ? '导出中...' : '导出' }}
                    </button>
                    <button v-if="d.exported && d.export_file" class="btn-sm download"
                      @click="downloadExport(d.export_file)">
                      下载
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- ============ PROMPTS TAB ============ -->
    <template v-if="activeTab === 'prompts'">
      <div class="prompts-layout">
        <!-- Left: date tree -->
        <div class="prompts-sidebar">
          <div class="card" style="margin:0;">
            <div class="card-title">
              <span>数据日期</span>
              <button class="btn-sm" @click="loadPromptDates" :disabled="datesLoading" style="margin-left:auto;">
                <span v-if="datesLoading" class="spin" style="width:10px;height:10px;"></span>
                ↻
              </button>
            </div>
            <template v-if="datesLoading && promptMonths.length === 0">
              <div class="shimmer" style="height:200px;"></div>
            </template>
            <template v-else-if="promptMonths.length === 0">
              <div class="empty-state" style="padding:20px;">暂无数据</div>
            </template>
            <template v-else>
              <div v-for="m in promptMonths" :key="m.month" class="date-month">
                <div class="date-month-header" @click="toggleMonth(m.month)">
                  <span class="date-month-arrow">{{ expandedMonths[m.month] ? '▾' : '▸' }}</span>
                  <span>{{ fmtMonth(m.month) }}</span>
                  <span class="badge" style="margin-left:auto;">{{ monthTotal(m) }}</span>
                </div>
                <div v-if="expandedMonths[m.month]" class="date-day-list">
                  <div v-for="d in m.days" :key="d.date"
                    :class="['date-day-item', { active: selectedDate === d.date }]"
                    @click="selectDate(d.date)">
                    <span>{{ fmtDay(d.date) }}</span>
                    <span class="badge">{{ d.count }}</span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Right: prompt cards -->
        <div class="prompts-main">
          <template v-if="!selectedDate">
            <div class="card" style="text-align:center;padding:80px 20px;color:var(--text-muted);">
              <div style="font-size:48px;margin-bottom:16px;">📋</div>
              <div>选择左侧日期查看当天提示词与回复</div>
            </div>
          </template>
          <template v-else>
            <template v-if="promptsLoading && prompts.items.length === 0">
              <div class="card shimmer" style="height:400px;"></div>
            </template>
            <template v-else>
              <!-- Prompt + Response Cards -->
              <div v-for="item in prompts.items" :key="item.id" class="qa-card">
                <!-- Question -->
                <div class="qa-question" @click="toggleExpand(item.id)">
                  <div class="qa-header">
                    <div class="qa-meta">
                      <span class="qa-time">{{ fmtTime(item.timestamp) }}</span>
                      <span class="model-tag">{{ shortModel(item.model) }}</span>
                      <span class="tag">{{ item.language }}</span>
                      <span style="font-size:12px;color:var(--text-muted);">{{ fmtInt(item.total_tokens) }} tokens</span>
                    </div>
                    <span style="color:var(--text-muted);font-size:12px;">{{ expandedId === item.id ? '收起 ▴' : '展开 ▾' }}</span>
                  </div>
                  <div class="qa-prompt">
                    <span class="qa-label">Q</span>
                    <span v-if="expandedId !== item.id" class="prompt-preview">{{ item.prompt_preview }}</span>
                    <span v-else class="prompt-full">{{ item.prompt_full }}</span>
                  </div>
                </div>

                <!-- Answer (visible when expanded) -->
                <div v-if="expandedId === item.id" class="qa-answer">
                  <!-- Thinking process -->
                  <div v-if="hasThinking(item)" class="qa-thinking">
                    <div class="qa-thinking-header">
                      <span class="qa-thinking-icon">🧠</span>
                      <span>思考过程</span>
                    </div>
                    <div class="qa-thinking-body">{{ extractThinking(item) }}</div>
                  </div>
                  <!-- Response -->
                  <div v-if="hasSolution(item)" class="qa-solution">
                    <div class="qa-solution-header">
                      <span class="qa-solution-icon">💬</span>
                      <span>模型回复</span>
                    </div>
                    <div class="qa-solution-body">{{ extractSolution(item) }}</div>
                  </div>
                  <!-- No response at all -->
                  <div v-if="!hasThinking(item) && !hasSolution(item)" class="qa-thinking" style="color:var(--text-muted);text-align:center;padding:16px;">
                    无回复内容
                  </div>
                </div>
              </div>

              <div v-if="prompts.items.length === 0" class="card">
                <div class="empty-state">当天暂无有效提示词数据</div>
              </div>

              <!-- Pagination -->
              <div class="pagination" v-if="prompts.total_pages > 1">
                <button class="btn-sm" :disabled="prompts.page <= 1" @click="goPromptPage(prompts.page - 1)">上一页</button>
                <span class="page-info">{{ prompts.page }} / {{ prompts.total_pages }}</span>
                <button class="btn-sm" :disabled="prompts.page >= prompts.total_pages" @click="goPromptPage(prompts.page + 1)">下一页</button>
              </div>
            </template>
          </template>
        </div>
      </div>
    </template>

    <!-- Toast -->
    <div v-if="toast.show" :class="['toast', toast.type]">{{ toast.message }}</div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          activeTab: 'usage',
          // Usage tab state
          days: 30, streamMode: true, autoRefresh: true, refreshSeconds: 5,
          refreshTimerId: null, stream: null, loading: false,
          summary: {
            total_tokens: 0, total_requests: 0, success_requests: 0, success_rate: 0,
            estimated_cost_usd: 0, prompt_tokens: 0, completion_tokens: 0,
            avg_latency_ms: 0, generated_at: "", daily: [], by_model: [], recent: [],
          },
          // Export tab state
          exportFormat: 'reasoning',
          exportDates: [], exportLoading: false,
          uploadingToMS: false, uploadingToHF: false,
          // Prompts tab state
          promptMonths: [], datesLoading: false, expandedMonths: {},
          selectedDate: null,
          promptsLoading: false,
          prompts: { items: [], total: 0, page: 1, per_page: 20, total_pages: 0 },
          promptsPage: 1, expandedId: null,
          toast: { show: false, message: '', type: 'success' },
        };
      },
      computed: {
        chartData() {
          const daily = this.summary.daily || [];
          const max = daily.reduce((m, p) => Math.max(m, p.total_tokens || 0, 1), 1);
          return daily.map((p) => {
            const total = p.total_tokens || 1;
            return {
              ...p, height: Math.max(2, (p.total_tokens / max) * 100),
              prompt_ratio: p.prompt_tokens / total, completion_ratio: p.completion_tokens / total,
              shortDate: (p.date || "").slice(5), dateLabel: p.date || "",
            };
          });
        },
        chartMax() {
          return (this.summary.daily || []).reduce((m, p) => Math.max(m, p.total_tokens || 0), 0) || 1;
        },
      },
      methods: {
        Math: window.Math,
        fmtInt(v) { return Number(v || 0).toLocaleString("zh-CN"); },
        fmtCost(v) { const n = Number(v || 0); if (n < 0.01) return n.toFixed(4); if (n < 1) return n.toFixed(3); return n.toFixed(2); },
        fmtLatency(ms) { const n = Number(ms || 0); return n < 1000 ? n + 'ms' : (n / 1000).toFixed(1) + 's'; },
        fmtTime(ts) {
          if (!ts) return '-';
          const d = new Date(ts), pad = (n) => String(n).padStart(2, '0');
          return pad(d.getMonth()+1) + '/' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        },
        timeAgo(ts) {
          if (!ts) return '-';
          const diff = Date.now() - new Date(ts).getTime(), sec = Math.floor(diff / 1000);
          if (sec < 60) return sec + 's ago'; if (sec < 3600) return Math.floor(sec/60) + 'm ago';
          if (sec < 86400) return Math.floor(sec/3600) + 'h ago'; return Math.floor(sec/86400) + 'd ago';
        },
        shortModel(m) { if (!m) return 'unknown'; return m.replace(/^claude-/, 'claude.').replace(/^gpt-/, 'gpt.'); },
        shortEndpoint(e) { if (!e) return '-'; const parts = e.split('/'); return parts[parts.length-1] || e; },
        ratio(a, b) { if (!b) return 0; return Math.round((a / b) * 100); },
        fmtExportDate(d) { if (!d || d.length !== 8) return d; return d.slice(0,4) + '-' + d.slice(4,6) + '-' + d.slice(6,8); },

        // === Usage tab ===
        async load() {
          this.loading = true;
          try {
            const res = await fetch(`/api/usage/summary?days=${this.days}&t=${Date.now()}`, { cache: "no-store" });
            if (!res.ok) throw new Error("Failed to fetch usage data");
            this.summary = await res.json();
          } catch (err) { console.error(err); }
          finally { this.loading = false; }
        },
        startAutoRefresh() { if (this.streamMode) return; this.stopAutoRefresh(); this.refreshTimerId = setInterval(() => this.load().catch(console.error), this.refreshSeconds * 1000); },
        stopAutoRefresh() { if (this.refreshTimerId) { clearInterval(this.refreshTimerId); this.refreshTimerId = null; } },
        startStream() {
          this.stopStream();
          const es = new EventSource(`/api/usage/stream?days=${this.days}`);
          es.addEventListener("usage", (evt) => { try { this.summary = JSON.parse(evt.data); } catch (err) { console.error(err); } });
          es.onerror = () => { this.streamMode = false; this.stopStream(); };
          this.stream = es;
        },
        stopStream() { if (this.stream) { this.stream.close(); this.stream = null; } },
        toggleStreamMode() { this.streamMode = !this.streamMode; if (this.streamMode) { this.stopAutoRefresh(); this.startStream(); } else { this.stopStream(); this.startAutoRefresh(); } },
        onDaysChange() { this.load().catch(console.error); if (this.streamMode) { this.stopStream(); this.startStream(); } },

        // === Export tab ===
        showToast(msg, type) {
          this.toast = { show: true, message: msg, type: type };
          setTimeout(() => { this.toast.show = false; }, 3500);
        },
        async loadExportDates() {
          this.exportLoading = true;
          try {
            const res = await fetch('/api/export/dates?t=' + Date.now(), { cache: "no-store" });
            if (!res.ok) throw new Error("Failed to load dates");
            const data = await res.json();
            // Preserve exporting state on existing entries
            const oldMap = {};
            this.exportDates.forEach(d => { oldMap[d.date] = d.exporting; });
            this.exportDates = (data.dates || []).map(d => ({ ...d, exporting: !!oldMap[d.date] }));
          } catch (err) {
            console.error(err);
            this.showToast('加载日期列表失败: ' + err.message, 'error');
          } finally { this.exportLoading = false; }
        },
        async triggerExport(d) {
          d.exporting = true;
          try {
            const res = await fetch('/api/export/day?date=' + d.date + '&format=' + this.exportFormat, { method: 'POST', cache: "no-store" });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Export failed');
            d.exported = true;
            d.export_file = data.file;
            this.showToast(d.date + ' 导出完成 — ' + this.fmtInt(data.rows) + ' 条记录', 'success');
          } catch (err) {
            console.error(err);
            this.showToast(d.date + ' 导出失败: ' + err.message, 'error');
          } finally { d.exporting = false; }
        },
        downloadExport(fileName) {
          window.open('/api/export/download?file=' + encodeURIComponent(fileName), '_blank');
        },
        async uploadToModelScope() {
          this.uploadingToMS = true;
          try {
            const res = await fetch('/api/modelscope/upload', { method: 'POST', cache: "no-store" });
            const data = await res.json();
            if (res.ok) {
              this.showToast('ModelScope 上传已触发，后台执行中...', 'success');
            } else {
              this.showToast('上传失败: ' + (data.message || data.error || res.statusText), 'error');
            }
          } catch (err) {
            this.showToast('上传请求失败: ' + err.message, 'error');
          } finally { this.uploadingToMS = false; }
        },
        async uploadToHuggingFace() {
          this.uploadingToHF = true;
          try {
            const res = await fetch('/api/huggingface/upload', { method: 'POST', cache: "no-store" });
            const data = await res.json();
            if (res.ok) {
              this.showToast('HuggingFace 上传已触发，后台执行中...', 'success');
            } else {
              this.showToast('上传失败: ' + (data.message || data.error || res.statusText), 'error');
            }
          } catch (err) {
            this.showToast('上传请求失败: ' + err.message, 'error');
          } finally { this.uploadingToHF = false; }
        },

        // === Prompts tab ===
        fmtMonth(m) { return m.slice(0,4) + '-' + m.slice(4,6); },
        fmtDay(d) { return d.slice(4,6) + '/' + d.slice(6,8); },
        monthTotal(m) { return m.days.reduce((s, d) => s + d.count, 0); },
        toggleMonth(month) {
          this.expandedMonths[month] = !this.expandedMonths[month];
        },
        async loadPromptDates() {
          this.datesLoading = true;
          try {
            const res = await fetch('/api/prompts/dates?t=' + Date.now(), { cache: "no-store" });
            if (!res.ok) throw new Error("Failed");
            const data = await res.json();
            this.promptMonths = data.months || [];
            // Auto-expand first month
            if (this.promptMonths.length > 0) {
              this.expandedMonths[this.promptMonths[0].month] = true;
            }
          } catch (err) {
            console.error(err);
          } finally { this.datesLoading = false; }
        },
        selectDate(date) {
          this.selectedDate = date;
          this.promptsPage = 1;
          this.expandedId = null;
          this.loadPrompts();
        },
        async loadPrompts() {
          if (!this.selectedDate) return;
          this.promptsLoading = true;
          try {
            const params = new URLSearchParams({
              date: this.selectedDate, page: this.promptsPage,
              per_page: 20, t: Date.now(),
            });
            const res = await fetch('/api/prompts?' + params, { cache: "no-store" });
            if (!res.ok) throw new Error("Failed to fetch prompts");
            this.prompts = await res.json();
          } catch (err) {
            console.error(err);
            this.showToast('加载提示词失败: ' + err.message, 'error');
          } finally { this.promptsLoading = false; }
        },
        goPromptPage(page) {
          if (page < 1 || page > this.prompts.total_pages) return;
          this.promptsPage = page;
          this.loadPrompts();
        },
        toggleExpand(id) { this.expandedId = this.expandedId === id ? null : id; },
        hasThinking(item) {
          if (!item.response_full) return false;
          return item.response_full.startsWith('【思考过程】');
        },
        hasSolution(item) {
          if (!item.response_full) return false;
          return item.response_full.includes('【回复】');
        },
        extractThinking(item) {
          const text = item.response_full || '';
          const idx = text.indexOf('【回复】');
          if (idx > 0) return text.substring('【思考过程】\n'.length, idx).trim();
          if (text.startsWith('【思考过程】\n')) return text.substring('【思考过程】\n'.length).trim();
          return text;
        },
        extractSolution(item) {
          const text = item.response_full || '';
          const idx = text.indexOf('【回复】\n');
          if (idx > 0) return text.substring(idx + '【回复】\n'.length).trim();
          if (!text.startsWith('【思考过程】')) return text;
          return '';
        },
      },
      mounted() {
        this.load();
        if (this.streamMode) this.startStream();
        else this.startAutoRefresh();
      },
      beforeUnmount() {
        this.stopAutoRefresh();
        this.stopStream();
      },
    }).mount("#app");
  </script>
</body>
</html>
