<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usage Dashboard</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --card: #161920;
      --card-hover: #1c202b;
      --line: #262a35;
      --line-hover: #3a3f50;
      --text: #e8edf5;
      --text-secondary: #8b95b0;
      --text-muted: #5c647a;
      --accent: #6c8cff;
      --accent-bg: rgba(108,140,255,0.12);
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.12);
      --orange: #f59e0b;
      --orange-bg: rgba(245,158,11,0.1);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --blue: #60a5fa;
      --input-color: #6c8cff;
      --output-color: #a78bfa;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }

    /* Header */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--output-color));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
    }
    .logo-text { font-size: 18px; font-weight: 600; }
    .logo-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
    .top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .top-actions select, .top-actions button {
      background: var(--card); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; padding: 6px 12px; font-size: 13px;
      cursor: pointer; font-family: var(--font);
    }
    .top-actions select { padding: 6px 28px 6px 12px; appearance: auto; }
    .top-actions button:hover { background: var(--card-hover); border-color: var(--line-hover); }
    .status-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.off { background: var(--text-muted); }

    /* Summary Grid */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 16px;
    }
    .summary-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 16px 18px;
      transition: border-color .15s, background .15s;
    }
    .summary-card:hover { border-color: var(--line-hover); background: var(--card-hover); }
    .summary-card .label {
      font-size: 12px; color: var(--text-secondary); font-weight: 500;
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .summary-card .value {
      font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
    }
    .summary-card .sub {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
    }
    .ratio-bar {
      display: flex; height: 3px; border-radius: 2px; overflow: hidden;
      margin-top: 10px; gap: 2px;
    }
    .ratio-bar .in { background: var(--input-color); }
    .ratio-bar .out { background: var(--output-color); }
    .ratio-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }

    /* Two column layout */
    .two-col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 12px; margin-bottom: 16px; }

    /* Card container */
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 18px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-title .badge {
      font-size: 11px; font-weight: 400; color: var(--text-secondary);
      background: var(--accent-bg); padding: 2px 8px; border-radius: 999px;
    }

    /* Chart */
    .chart-wrap { position: relative; }
    .chart-y-label {
      position: absolute; left: 0; top: 0; bottom: 28px;
      display: flex; flex-direction: column; justify-content: space-between;
      font-size: 10px; color: var(--text-muted); width: 40px; text-align: right;
      padding-right: 8px;
    }
    .chart-area {
      margin-left: 48px; height: 200px;
      display: flex; align-items: flex-end; gap: 3px;
    }
    .col-wrap { flex: 1; min-width: 6px; display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
    .col-stack { width: 100%; border-radius: 3px 3px 0 0; display: flex; flex-direction: column; min-height: 2px; transition: opacity .15s; }
    .col-stack:hover { opacity: 0.8; }
    .col-stack .i { background: var(--input-color); }
    .col-stack .o { background: var(--output-color); }
    .col-label { font-size: 9px; color: var(--text-muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40px; }
    .col-tooltip {
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #1c202b; border: 1px solid var(--line-hover); border-radius: 8px;
      padding: 8px 12px; font-size: 12px; white-space: nowrap; z-index: 10;
      pointer-events: none; opacity: 0; transition: opacity .15s; margin-bottom: 6px;
    }
    .col-wrap:hover .col-tooltip { opacity: 1; }

    /* Model table */
    .model-list { display: flex; flex-direction: column; gap: 10px; }
    .model-row { }
    .model-row .top {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
    }
    .model-row .top .name { font-size: 13px; font-weight: 500; }
    .model-row .top .tokens { font-size: 12px; color: var(--text-secondary); }
    .model-bar-wrap {
      height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden;
      display: flex; gap: 1px;
    }
    .model-bar-wrap .i { background: var(--input-color); height: 100%; }
    .model-bar-wrap .o { background: var(--output-color); height: 100%; }
    .model-row .cost-row {
      display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 3px;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 6px; color: var(--text-secondary); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--line); }
    td { padding: 8px 6px; border-bottom: 1px solid rgba(38,42,53,0.5); white-space: nowrap; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .status-code { display: inline-flex; align-items: center; gap: 4px; }
    .dot-ok { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .dot-err { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
    .model-tag {
      display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 999px;
      background: var(--accent-bg); color: var(--accent);
    }

    /* Responsive */
    @media (max-width: 880px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .summary-grid { grid-template-columns: 1fr; }
      .app { padding: 16px 12px; }
    }

    /* Loading shimmer */
    .shimmer { position: relative; overflow: hidden; }
    .shimmer::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
  <div id="app" class="app">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo-area">
        <div class="logo-icon">P</div>
        <div>
          <div class="logo-text">Usage</div>
          <div class="logo-sub">LLM Proxy Dashboard</div>
        </div>
      </div>
      <div class="top-actions">
        <span :class="'status-dot ' + (streamMode ? 'on' : 'off')"></span>
        <span style="font-size:12px;color:var(--text-secondary)">{{ streamMode ? 'Live' : 'Polling' }}</span>
        <select v-model.number="days" @change="onDaysChange">
          <option :value="7">7 days</option>
          <option :value="14">14 days</option>
          <option :value="30">30 days</option>
          <option :value="90">90 days</option>
        </select>
        <button @click="toggleStreamMode">{{ streamMode ? 'Polling' : 'Live' }}</button>
        <button @click="load" style="display:flex;align-items:center;gap:4px;">
          <span v-if="loading" style="display:inline-block;width:12px;height:12px;border:2px solid var(--text-muted);border-top-color:var(--text);border-radius:50%;animation:spin .6s linear infinite;"></span>
          Refresh
        </button>
      </div>
    </div>

    <!-- Loading skeleton -->
    <template v-if="loading && !summary.total_requests">
      <div class="summary-grid">
        <div v-for="n in 4" class="summary-card shimmer" style="height:88px"></div>
      </div>
      <div class="card shimmer" style="height:300px;margin-bottom:16px"></div>
    </template>

    <template v-else>
      <!-- Summary Cards -->
      <div class="summary-grid">
        <div class="summary-card">
          <div class="label">💰 Total Cost</div>
          <div class="value">${{ fmtCost(summary.estimated_cost_usd) }}</div>
          <div class="sub">{{ fmtInt(summary.total_requests) }} requests</div>
        </div>
        <div class="summary-card">
          <div class="label">📊 Total Tokens</div>
          <div class="value">{{ fmtInt(summary.total_tokens) }}</div>
          <div class="sub">
            {{ fmtInt(summary.prompt_tokens) }} in · {{ fmtInt(summary.completion_tokens) }} out
          </div>
          <div class="ratio-bar" v-if="summary.total_tokens > 0">
            <div class="in" :style="{flex: summary.prompt_tokens / summary.total_tokens}"></div>
            <div class="out" :style="{flex: summary.completion_tokens / summary.total_tokens}"></div>
          </div>
          <div class="ratio-labels">
            <span>Input {{ ratio(summary.prompt_tokens, summary.total_tokens) }}%</span>
            <span>Output {{ ratio(summary.completion_tokens, summary.total_tokens) }}%</span>
          </div>
        </div>
        <div class="summary-card">
          <div class="label">✅ Success Rate</div>
          <div class="value">{{ (summary.success_rate * 100).toFixed(1) }}%</div>
          <div class="sub">{{ fmtInt(summary.success_requests) }} / {{ fmtInt(summary.total_requests) }} succeeded</div>
          <div class="ratio-bar" v-if="summary.total_requests > 0">
            <div class="in" :style="{flex: summary.success_rate}"></div>
            <div class="out" :style="{flex: 1 - summary.success_rate}"></div>
          </div>
        </div>
        <div class="summary-card">
          <div class="label">⚡ Avg Latency</div>
          <div class="value">{{ fmtLatency(summary.avg_latency_ms) }}</div>
          <div class="sub">Updated {{ timeAgo(summary.generated_at) }}</div>
        </div>
      </div>

      <!-- Two Column: Chart + Models -->
      <div class="two-col">
        <div class="card">
          <div class="card-title">
            <span>Daily Token Usage</span>
            <span class="badge">{{ chartData.length }} days</span>
          </div>
          <div class="chart-wrap">
            <div class="chart-y-label">
              <span>{{ fmtInt(chartMax) }}</span>
              <span>{{ fmtInt(Math.round(chartMax/2)) }}</span>
              <span>0</span>
            </div>
            <div class="chart-area">
              <div class="col-wrap" v-for="point in chartData" :key="point.date">
                <div class="col-tooltip">
                  <div style="font-weight:600;margin-bottom:4px;">{{ point.dateLabel }}</div>
                  <div style="display:flex;gap:12px;">
                    <span>Input {{ fmtInt(point.prompt_tokens) }}</span>
                    <span>Output {{ fmtInt(point.completion_tokens) }}</span>
                  </div>
                </div>
                <div class="col-stack" :style="{height: point.height + '%'}">
                  <div class="o" :style="{flex: point.completion_ratio}"></div>
                  <div class="i" :style="{flex: point.prompt_ratio}"></div>
                </div>
                <div class="col-label">{{ point.shortDate }}</div>
              </div>
              <div v-if="chartData.length === 0" class="empty-state">No data for this period</div>
            </div>
          </div>
          <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text-secondary);">
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--input-color);vertical-align:middle;margin-right:4px;"></span> Input</span>
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--output-color);vertical-align:middle;margin-right:4px;"></span> Output</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <span>Models</span>
            <span class="badge">{{ summary.by_model.length }}</span>
          </div>
          <div class="model-list">
            <template v-if="summary.by_model.length === 0">
              <div class="empty-state">No model data</div>
            </template>
            <div class="model-row" v-for="m in summary.by_model" :key="m.model">
              <div class="top">
                <span class="name">{{ shortModel(m.model) }}</span>
                <span class="tokens">{{ fmtInt(m.total_tokens) }} tokens</span>
              </div>
              <div class="model-bar-wrap">
                <div class="i" :style="{flex: m.prompt_tokens / Math.max(m.total_tokens, 1)}"></div>
                <div class="o" :style="{flex: m.completion_tokens / Math.max(m.total_tokens, 1)}"></div>
              </div>
              <div class="cost-row">
                <span>{{ fmtInt(m.requests) }} req · {{ fmtInt(m.prompt_tokens) }} in / {{ fmtInt(m.completion_tokens) }} out</span>
                <span>${{ fmtCost(m.estimated_cost_usd) }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent Requests -->
      <div class="card">
        <div class="card-title">
          <span>Recent Requests</span>
          <span class="badge">Top {{ Math.min(summary.recent.length, 20) }}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Model</th>
                <th>Endpoint</th>
                <th>Status</th>
                <th style="text-align:right">Input</th>
                <th style="text-align:right">Output</th>
                <th style="text-align:right">Total</th>
                <th style="text-align:right">Latency</th>
                <th style="text-align:right">Cost</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="r in summary.recent" :key="r.timestamp + r.model + r.endpoint">
                <td style="color:var(--text-secondary);font-size:12px;">{{ fmtTime(r.timestamp) }}</td>
                <td><span class="model-tag">{{ shortModel(r.model) }}</span></td>
                <td>{{ shortEndpoint(r.endpoint) }}</td>
                <td>
                  <span class="status-code">
                    <span :class="r.status_code < 400 ? 'dot-ok' : 'dot-err'"></span>
                    {{ r.status_code }}
                  </span>
                </td>
                <td style="text-align:right">{{ fmtInt(r.prompt_tokens) }}</td>
                <td style="text-align:right">{{ fmtInt(r.completion_tokens) }}</td>
                <td style="text-align:right;font-weight:500;">{{ fmtInt(r.total_tokens) }}</td>
                <td style="text-align:right;color:var(--text-secondary)">{{ fmtLatency(r.duration_ms) }}</td>
                <td style="text-align:right;color:var(--text-secondary)">${{ r.estimated_cost_usd.toFixed(4) }}</td>
              </tr>
              <tr v-if="summary.recent.length === 0">
                <td colspan="9" class="empty-state">No recent requests</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </template>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          days: 30,
          streamMode: true,
          autoRefresh: true,
          refreshSeconds: 5,
          refreshTimerId: null,
          stream: null,
          loading: false,
          summary: {
            total_tokens: 0,
            total_requests: 0,
            success_requests: 0,
            success_rate: 0,
            estimated_cost_usd: 0,
            prompt_tokens: 0,
            completion_tokens: 0,
            avg_latency_ms: 0,
            generated_at: "",
            daily: [],
            by_model: [],
            recent: [],
          },
        };
      },
      computed: {
        chartData() {
          const daily = this.summary.daily || [];
          const max = daily.reduce((m, p) => Math.max(m, p.total_tokens || 0, 1), 1);
          return daily.map((p) => {
            const total = p.total_tokens || 1;
            const inR = p.prompt_tokens / total;
            const outR = p.completion_tokens / total;
            return {
              ...p,
              height: Math.max(2, (p.total_tokens / max) * 100),
              prompt_ratio: inR,
              completion_ratio: outR,
              shortDate: (p.date || "").slice(5),
              dateLabel: p.date || "",
            };
          });
        },
        chartMax() {
          const daily = this.summary.daily || [];
          return daily.reduce((m, p) => Math.max(m, p.total_tokens || 0), 0) || 1;
        },
      },
      methods: {
        Math: window.Math,
        fmtInt(v) {
          return Number(v || 0).toLocaleString("zh-CN");
        },
        fmtCost(v) {
          const n = Number(v || 0);
          if (n < 0.01) return n.toFixed(4);
          if (n < 1) return n.toFixed(3);
          return n.toFixed(2);
        },
        fmtLatency(ms) {
          const n = Number(ms || 0);
          if (n < 1000) return n + 'ms';
          return (n / 1000).toFixed(1) + 's';
        },
        fmtTime(ts) {
          if (!ts) return '-';
          const d = new Date(ts);
          const pad = (n) => String(n).padStart(2, '0');
          return pad(d.getMonth()+1) + '/' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        },
        timeAgo(ts) {
          if (!ts) return '-';
          const diff = Date.now() - new Date(ts).getTime();
          const sec = Math.floor(diff / 1000);
          if (sec < 60) return sec + 's ago';
          if (sec < 3600) return Math.floor(sec/60) + 'm ago';
          if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
          return Math.floor(sec/86400) + 'd ago';
        },
        shortModel(m) {
          if (!m) return 'unknown';
          return m.replace(/^claude-/, 'claude.').replace(/^gpt-/, 'gpt.');
        },
        shortEndpoint(e) {
          if (!e) return '-';
          const parts = e.split('/');
          return parts[parts.length-1] || e;
        },
        ratio(a, b) {
          if (!b) return 0;
          return Math.round((a / b) * 100);
        },
        async load() {
          this.loading = true;
          try {
            const res = await fetch(`/api/usage/summary?days=${this.days}&t=${Date.now()}`, {
              cache: "no-store",
            });
            if (!res.ok) throw new Error("Failed to fetch usage data");
            const data = await res.json();
            this.summary = data;
          } catch (err) {
            console.error(err);
          } finally {
            this.loading = false;
          }
        },
        startAutoRefresh() {
          if (this.streamMode) return;
          this.stopAutoRefresh();
          this.refreshTimerId = setInterval(() => {
            this.load().catch(console.error);
          }, this.refreshSeconds * 1000);
        },
        stopAutoRefresh() {
          if (this.refreshTimerId) {
            clearInterval(this.refreshTimerId);
            this.refreshTimerId = null;
          }
        },
        startStream() {
          this.stopStream();
          const es = new EventSource(`/api/usage/stream?days=${this.days}`);
          es.addEventListener("usage", (evt) => {
            try { this.summary = JSON.parse(evt.data); } catch (err) { console.error(err); }
          });
          es.onerror = () => {
            this.streamMode = false;
            this.stopStream();
          };
          this.stream = es;
        },
        stopStream() {
          if (this.stream) { this.stream.close(); this.stream = null; }
        },
        toggleStreamMode() {
          this.streamMode = !this.streamMode;
          if (this.streamMode) { this.stopAutoRefresh(); this.startStream(); }
          else { this.stopStream(); this.startAutoRefresh(); }
        },
        onDaysChange() {
          this.load().catch(console.error);
          if (this.streamMode) { this.stopStream(); this.startStream(); }
        },
      },
      mounted() {
        this.load();
        if (this.streamMode) this.startStream();
        else this.startAutoRefresh();
      },
      beforeUnmount() {
        this.stopAutoRefresh();
        this.stopStream();
      },
    }).mount("#app");
  </script>
</body>
</html>
